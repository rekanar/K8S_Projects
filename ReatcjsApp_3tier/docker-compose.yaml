# For local development without Kubernetes
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vignan_school
      POSTGRES_USER: vignan_admin
      POSTGRES_PASSWORD: vignan@2024
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vignan_school
      DB_USER: vignan_admin
      DB_PASSWORD: vignan@2024
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    volumes:
      - ./frontend/nginx-local.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
